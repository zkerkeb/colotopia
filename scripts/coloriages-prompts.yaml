# Coloring page prompt templates
# Used by generate-coloriages.py to generate images via Gemini Imagen 4
#
# Structure:
#   categories:
#     <category_key>:
#       subjects:
#         - fr_slug: <slug used for FR filenames>
#           en_slug: <slug used for EN filenames>
#           fr_title: <French display title>
#           en_title: <English display title>
#           fr_tags: <list of French tags>
#           en_tags: <list of English tags>
#           prompt: <image generation prompt>

base_prompt_suffix: >
  Coloring book page style. Thick clean black outlines on pure white background.
  No shading, no gradients, no color fill. Simple bold shapes suitable for
  children ages 3-10 to color. Cute and friendly style. Printable quality.
  No text, no words, no letters, no watermark.

adult_prompt_suffix: >
  Adult coloring page style. Intricate detailed black line art on pure white background.
  No shading, no gradients, no color fill. Complex patterns with fine lines suitable
  for adult stress relief and mindfulness coloring. High detail, elegant design. Printable quality.
  No text, no words, no letters, no watermark.

