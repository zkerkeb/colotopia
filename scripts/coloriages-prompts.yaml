# Coloring page prompt templates
# Used by generate-coloriages.py to generate images via DALL-E 3
#
# Structure:
#   categories:
#     <category_key>:
#       subjects:
#         - fr_slug: <slug used for FR filenames>
#           en_slug: <slug used for EN filenames>
#           fr_title: <French display title>
#           en_title: <English display title>
#           fr_tags: <list of French tags>
#           en_tags: <list of English tags>
#           prompt: <DALL-E 3 prompt for image generation>

base_prompt_suffix: >
  Coloring book page style. Thick clean black outlines on pure white background.
  No shading, no gradients, no color fill. Simple bold shapes suitable for
  children ages 3-8 to color. Cute and friendly style. Printable quality.

